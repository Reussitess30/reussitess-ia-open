<!DOCTYPE html>
<html>
<head>
  <title>Reussitess Premium 4.99€ 🇬🇵</title>
  <meta name="viewport" content="width=device-width">
  <style>
    body { margin: 0; padding: 2rem; font-family: system-ui; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; padding: 3rem; box-shadow: 0 20px 40px rgba(0,0,0,0.2); text-align: center; }
    h1 { background: linear-gradient(45deg, #FF6B35, #F7931E); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 3rem; margin: 0 0 1rem 0; }
    .price { font-size: 2.5rem; color: #00A676; font-weight: bold; margin: 1rem 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>👑 Reussitess Premium</h1>
    <div class="price">4.99€ / mois</div>
    <p>✅ Traducteur Créole Illimité<br/>🇬🇵 Rony Porinus - 1er Testeur Officiel</p>
    
    <!-- BOUTON PAYPAL ICI -->
    <div id="paypal-button-container"></div>
  </div>

  <script src="https://www.paypal.com/sdk/js?client-id=P-9HS41937PC944162RNHPZWMY&currency=EUR" onload="initPayPal()"></script>
  <script>
    function initPayPal() {
      paypal.Buttons({
        createOrder: function(data, actions) {
          return actions.order.create({
            purchase_units: [{
              description: 'Reussitess Premium - Créole Guadeloupéen Illimité',
              amount: { currency_code: 'EUR', value: '4.99' }
            }]
          });
        },
        onApprove: function(data, actions) {
          return actions.order.capture().then(function(details) {
            alert('✅ Premium activé ! Transaction: ' + details.id + ' - Merci ' + details.payer.name.given_name + ' !');
          });
        }
      }).render('#paypal-button-container');
    }
  </script>
</body>
</html>
